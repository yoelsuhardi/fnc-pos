name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      - name: Verify dist output
        run: |
          echo "Listing dist/ contents:"
          dir dist
          echo "electron-builder version:"
          npx electron-builder --version

      - name: Build & Publish EXE to GitHub Release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: Upload installer as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FNC-POS-Release-${{ github.ref_name }}
          path: |
            dist_electron/*.exe
            dist_electron/*.msi
          if-no-files-found: warn
          retention-days: 90
